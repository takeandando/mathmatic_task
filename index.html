<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>時間制限つき計算課題</title>

  <script src="https://unpkg.com/jspsych@8.2.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@2.1.0"></script>
  <link href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css" rel="stylesheet" type="text/css" />

  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#f7f7f7; margin:0; }
    .task-wrap { max-width:720px; margin:0 auto; padding:22px 16px; text-align:center; box-sizing:border-box; }
    .progress { font-size:18px; margin-bottom:10px; color:#333; }
    .timer-area { width:210px; height:210px; margin:10px auto 18px; position:relative; }
    .timer-svg { width:210px; height:210px; transform:rotate(-90deg); }
    .timer-bg { fill:none; stroke:#d8d8d8; stroke-width:14; }
    .timer-progress { fill:none; stroke:#2f5fba; stroke-width:14; stroke-linecap:round; }
    .timer-progress.warning { stroke:#c0392b; }
    .timer-number { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:52px; font-weight:800; color:#333; }
    .problem { font-size:clamp(34px, 8vw, 52px); font-weight:800; margin:16px 0 20px; letter-spacing:1px; }
    .answer-input { width:82%; max-width:340px; font-size:32px; text-align:center; padding:12px; border:2px solid #333; border-radius:12px; background:#fff; box-sizing:border-box; }
    .submit-button { display:block; width:82%; max-width:340px; margin:16px auto 0; padding:14px 16px; font-size:22px; font-weight:800; border:none; border-radius:12px; background:#333; color:#fff; }
    .note { font-size:16px; color:#555; margin-top:16px; line-height:1.7; }
    .form-label { display:block; text-align:left; max-width:420px; margin:16px auto 6px; font-size:16px; font-weight:700; }
    .form-input { display:block; width:90%; max-width:420px; margin:0 auto 12px; padding:12px; font-size:18px; border:2px solid #333; border-radius:10px; box-sizing:border-box; background:#fff; }

　　@media (max-width: 480px) {
  　　body {
    　　overflow-x: hidden;
  　　}
　　  .task-wrap {
   　　 padding: 8px 12px 12px;
  　　}
　　  .progress {
   　　 font-size: 14px;
    　　margin-bottom: 4px;
　　  }
　　  .timer-area {
   　　 width: 120px;
    　　height: 120px;
    　　margin: 0 auto 8px;
　　  }
  　　.timer-svg {
    　　width: 120px;
    　　height: 120px;
　　  }
　　  .timer-bg,
  　　.timer-progress {
    　　stroke-width: 10;
　　  }
　　  .timer-number {
   　　 font-size: 34px;
　　  }
　　  .problem {
   　　 font-size: clamp(30px, 9vw, 42px);
    　　margin: 8px 0 12px;
    　　line-height: 1.15;
　　  }
　　  .answer-input {
   　　 width: 86%;
    　　max-width: 320px;
    　　font-size: 28px;
    　　padding: 8px;
    　　border-radius: 10px;
　　  }
　　  .submit-button {
   　　 width: 86%;
    　　max-width: 320px;
    　　margin: 10px auto 0;
    　　padding: 10px 14px;
    　　font-size: 20px;
    　　border-radius: 10px;
　　  }
　　  .note {
   　　 font-size: 14px;
    　　margin-top: 10px;
    　　line-height: 1.5;
　　  }
　　}
   　　 }
  　　</style>
　　</head>

　　<body></body>

<script>
  /*
    GitHub Pages + Google Sheets回収版
    - 学生番号を最初に取得
    - public IPをクライアント側で取得して送信
    - Apps Script側でスプレッドシートに保存
  */

  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby-kMO9bK_pKARQaloIdT0AqueEOGclVo-VfWfVAB3wNfPRbHnj2ZDQPvtzafrdCInjMg/exec";

  const TIME_LIMIT_SEC = 10;
  const TIME_LIMIT_MS = TIME_LIMIT_SEC * 1000;
  const N_TRIALS = 30;
  const RADIUS = 88;
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

  let participantInfo = {};
  let publicIP = "";
  let ipFetchStatus = "not_started";

  async function fetchPublicIP() {
    ipFetchStatus = "fetching";
    try {
      const res = await fetch("https://api64.ipify.org?format=json", { cache: "no-store" });
      const json = await res.json();
      publicIP = json.ip || "";
      ipFetchStatus = publicIP ? "success" : "empty";
    } catch (e) {
      publicIP = "";
      ipFetchStatus = "failed";
    }
  }

  const jsPsych = initJsPsych({
    on_finish: async function() {
      if (!publicIP) {
        await fetchPublicIP();
      }

      const taskData = jsPsych.data.get().filter({trial_type_label: "calculation"}).values();

      const payload = {
        submitted_at: new Date().toISOString(),
        student_id: participantInfo.student_id || "",
        group_id: participantInfo.group_id || "",
        condition: participantInfo.condition || "",
        public_ip: publicIP,
        ip_fetch_status: ipFetchStatus,
        user_agent: navigator.userAgent,
        screen_width: window.screen.width,
        screen_height: window.screen.height,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        n_trials: taskData.length,
        data: taskData
      };

      document.body.innerHTML = `
        <div class="task-wrap">
          <h2>データ送信中です</h2>
          <p class="note">画面を閉じずにそのままお待ちください。</p>
        </div>
      `;

      try {
        await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        document.body.innerHTML = `
          <div class="task-wrap">
            <h2>課題は終了です</h2>
            <p class="note">データ送信が完了しました。おつかれさまでした。</p>
          </div>
        `;
      } catch (error) {
        document.body.innerHTML = `
          <div class="task-wrap">
            <h2>送信エラー</h2>
            <p class="note">データ送信に失敗しました。教員または担当者にこの画面を見せてください。</p>
            <p class="note">エラー内容：${error}</p>
          </div>
        `;
      }
    }
  });

  function generateProblem() {
    const problemTypes = ["subtract", "add3", "multiply"];
    const type = jsPsych.randomization.sampleWithoutReplacement(problemTypes, 1)[0];
    let question, correct;

    if (type === "subtract") {
      const a = Math.floor(Math.random() * 60) + 40;
      const b = Math.floor(Math.random() * 30) + 10;
      question = `${a} − ${b}`;
      correct = a - b;
    } else if (type === "add3") {
      const a = Math.floor(Math.random() * 40) + 10;
      const b = Math.floor(Math.random() * 40) + 10;
      const c = Math.floor(Math.random() * 30) + 10;
      question = `${a} ＋ ${b} ＋ ${c}`;
      correct = a + b + c;
    } else {
      const a = Math.floor(Math.random() * 8) + 12;
      const b = Math.floor(Math.random() * 7) + 3;
      question = `${a} × ${b}`;
      correct = a * b;
    }

    return { question, correct, problem_type: type };
  }

  const problems = [];
  for (let i = 0; i < N_TRIALS; i++) problems.push({ ...generateProblem(), trial_number: i + 1 });

  const infoForm = {
  type: jsPsychHtmlKeyboardResponse,
  choices: "NO_KEYS",
  stimulus: `
    <div class="task-wrap">
      <h2>参加情報の入力</h2>
      <p class="note">
        学生番号、グループ番号を入力してください。<br>
      </p>

      <form id="participant-form" novalidate>
        <label class="form-label">学生番号</label>
        <input
          class="form-input"
          id="student_id"
          name="student_id"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          required
        >

        <label class="form-label">グループ番号</label>
        <input
          class="form-input"
          id="group_id"
          name="group_id"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          required
        >

        <button type="submit" class="submit-button">次へ</button>
      </form>

      <p id="form-error" class="note" style="color:#c0392b; font-weight:700;"></p>
    </div>
  `,
  on_load: function() {
    const form = document.getElementById("participant-form");
    const studentInput = document.getElementById("student_id");
    const groupInput = document.getElementById("group_id");
    const errorBox = document.getElementById("form-error");

    studentInput.focus();

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const studentId = studentInput.value.trim();
      const groupId = groupInput.value.trim();

      if (studentId === "" && groupId === "") {
        errorBox.textContent = "学生番号とグループ番号を入力してください。";
        studentInput.focus();
        return;
      }

      if (studentId === "") {
        errorBox.textContent = "学生番号を入力してください。";
        studentInput.focus();
        return;
      }

      if (groupId === "") {
        errorBox.textContent = "グループ番号を入力してください。";
        groupInput.focus();
        return;
      }

      participantInfo = {
        student_id: studentId,
        group_id: groupId,
        condition: ""
      };

      await fetchPublicIP();

      jsPsych.finishTrial({
        student_id: studentId,
        group_id: groupId,
        condition: "",
        public_ip: publicIP,
        ip_fetch_status: ipFetchStatus
      });
    });

    // Enterキーで空欄のまま進むのを防ぐ
    studentInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        groupInput.focus();
      }
    });

    groupInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        form.requestSubmit();
      }
    });
  }
};

  const instruction = {
  type: jsPsychHtmlKeyboardResponse,
  choices: "NO_KEYS",
  stimulus: `
    <div class="task-wrap">
      <h2>時間制限つき計算課題</h2>
      <p class="note">
        これから計算問題が表示されます。<br>
        各問題の制限時間は <strong>${TIME_LIMIT_SEC}秒</strong> です。<br>
        画面上部の円形タイマーが徐々に減っていきます。<br>
        答えを入力して、「回答」ボタンで確定してください。
      </p>
      <p class="note">
        できるだけ速く、正確に回答してください。
        準備ができた人は開始ボタンを押してください。
      </p>

      <button id="start-task-button" class="submit-button">開始</button>
    </div>
  `,
  on_load: function() {
    const button = document.getElementById("start-task-button");

    button.addEventListener("click", function() {
      jsPsych.finishTrial();
    });

    button.addEventListener("touchstart", function(e) {
      e.preventDefault();
      jsPsych.finishTrial();
    }, { passive: false });
  }
};

  function makeCalculationTrial(problem) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    choices: "NO_KEYS",
    stimulus: `
      <div class="task-wrap">
        <div class="progress">問題 ${problem.trial_number} / ${N_TRIALS}</div>
        <div class="timer-area">
          <svg class="timer-svg" viewBox="0 0 210 210" aria-label="残り時間">
            <circle class="timer-bg" cx="105" cy="105" r="${RADIUS}"></circle>
            <circle id="timer-progress" class="timer-progress" cx="105" cy="105" r="${RADIUS}" stroke-dasharray="${CIRCUMFERENCE}" stroke-dashoffset="0"></circle>
          </svg>
          <div id="timer-number" class="timer-number">${TIME_LIMIT_SEC}</div>
        </div>
        <div class="problem">${problem.question} = ?</div>

        <input
          id="answer"
          class="answer-input"
          type="number"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="off"
          placeholder="答え"
        />

        <button id="submit" class="submit-button">回答</button>

        <div id="answer-error" class="note" style="color:#c0392b; font-weight:700;"></div>

      </div>
    `,
    on_load: function() {
      const startTime = performance.now();
      const input = document.getElementById("answer");
      const submit = document.getElementById("submit");
      const timerProgress = document.getElementById("timer-progress");
      const timerNumber = document.getElementById("timer-number");
      const answerError = document.getElementById("answer-error");

      let finished = false;
      input.focus();

      function finishTrial(timedOut = false) {
        if (finished) return;
        finished = true;

        const endTime = performance.now();
        const rawAnswer = input.value.trim();
        const numericAnswer = rawAnswer === "" ? null : Number(rawAnswer);
        const rt = Math.round(endTime - startTime);
        const isCorrect = numericAnswer === problem.correct;

        jsPsych.finishTrial({
          trial_type_label: "calculation",
          student_id: participantInfo.student_id || "",
          group_id: participantInfo.group_id || "",
          condition: participantInfo.condition || "",
          public_ip: publicIP,
          ip_fetch_status: ipFetchStatus,
          trial_number: problem.trial_number,
          problem_type: problem.problem_type,
          question: problem.question,
          correct_answer: problem.correct,
          response: rawAnswer,
          numeric_response: numericAnswer,
          correct: isCorrect,
          timed_out: timedOut,
          rt: rt,
          time_limit_sec: TIME_LIMIT_SEC
        });
      }

      function submitAnswer() {
        const rawAnswer = input.value.trim();

        if (rawAnswer === "") {
          answerError.textContent = "回答を入力してください。時間切れの場合のみ未回答として次へ進みます。";
          input.focus();
          return;
        }

        answerError.textContent = "";
        finishTrial(false);
      }

      submit.addEventListener("click", submitAnswer);

      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          submitAnswer();
        }
      });

      input.addEventListener("input", function() {
        if (input.value.trim() !== "") {
          answerError.textContent = "";
        }
      });

      function updateTimer() {
        if (finished) return;

        const elapsed = performance.now() - startTime;
        const remainingMs = Math.max(TIME_LIMIT_MS - elapsed, 0);
        const remainingRatio = remainingMs / TIME_LIMIT_MS;

        timerProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - remainingRatio);
        timerNumber.textContent = Math.ceil(remainingMs / 1000);

        if (remainingMs <= 3000) {
          timerProgress.classList.add("warning");
        }

        if (remainingMs <= 0) {
          finishTrial(true);
          return;
        }

        requestAnimationFrame(updateTimer);
      }

      requestAnimationFrame(updateTimer);
    }
  };
}

const endMessage = {
  type: jsPsychHtmlKeyboardResponse,
  choices: "NO_KEYS",
  stimulus: `
    <div class="task-wrap">
      <h2>終了</h2>
      <p class="note">下のボタンを押すと終了します。</p>
      <button id="send-data-button" class="submit-button">終了</button>
    </div>
  `,
  on_load: function() {
    const button = document.getElementById("send-data-button");

    button.addEventListener("click", function() {
      jsPsych.finishTrial();
    });

    button.addEventListener("touchstart", function(e) {
      e.preventDefault();
      jsPsych.finishTrial();
    }, { passive: false });
  }
};

  const timeline = [infoForm, instruction];
  problems.forEach(problem => timeline.push(makeCalculationTrial(problem)));
  timeline.push(endMessage);
  jsPsych.run(timeline);
</script>
</html>
